<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlaw Ducks TC – Oulu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prosto+One&family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --offblack: #141414;
    --darkgray: #1c1c1c;
    --midgray: #2e2e2e;
    --lightgray: #888;
    --bone: #d4c9a8;
    --cream: #f0ead8;
    --gold: #c9a84c;
    --gold-dark: #9a7a2e;
    --duck-green: #2d5a3d;
    --duck-brown: #6b3c1e;
    --duck-orange: #d4651a;
    --white: #f5f0e8;
    --red: #a02020;
    --font-display: 'Prosto One', serif;
    --font-body: 'Oswald', sans-serif;
    --font-text: 'Barlow', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-text);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(13,13,13,0.95);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo img { height: 44px; width: 44px; object-fit: contain; }

  .nav-brand {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .nav-brand span {
    display: block;
    font-family: var(--font-body);
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--lightgray);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }

  .nav-links a {
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bone);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* DUCK COUNTER in nav */
  .duck-counter {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--lightgray);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 4px 12px;
    border-radius: 2px;
    cursor: default;
    transition: border-color 0.3s;
  }

  .duck-counter.active { border-color: rgba(201,168,76,0.5); color: var(--gold); }
  .duck-counter-icon { font-size: 1rem; }
  .duck-counter-num { font-family: var(--font-display); font-size: 1rem; color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-bg-ring {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: slowspin 40s linear infinite;
  }

  .hero-bg-ring:nth-child(2) {
    width: 900px; height: 900px;
    border-color: rgba(201,168,76,0.04);
    animation-duration: 60s;
    animation-direction: reverse;
  }

  @keyframes slowspin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .hero-logo {
    width: 220px; height: 220px;
    object-fit: contain;
    position: relative; z-index: 1;
    filter: drop-shadow(0 0 40px rgba(201,168,76,0.2));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 7rem);
    letter-spacing: 0.05em;
    color: var(--white);
    line-height: 0.9;
    margin-top: 2rem;
    position: relative; z-index: 1;
  }

  .hero h1 em { display: block; color: var(--gold); font-style: normal; }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 0.9rem; font-weight: 300;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--lightgray);
    margin-top: 1rem;
    position: relative; z-index: 1;
  }

  .hero-divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
    position: relative; z-index: 1;
  }

  .hero-tagline {
    font-family: var(--font-text);
    font-style: italic; font-size: 1.05rem;
    color: var(--bone); max-width: 500px;
    position: relative; z-index: 1;
  }

  .hero-scroll {
    margin-top: 3rem;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    color: var(--lightgray);
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: var(--font-body);
    position: relative; z-index: 1;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  .hero-scroll::after { content: '▼'; font-size: 0.6rem; }

  section { position: relative; z-index: 1; }

  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 5rem 2rem;
  }

  .section-label {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.5rem;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: var(--white); line-height: 1; margin-bottom: 2rem;
  }

  .section-divider {
    width: 60px; height: 2px;
    background: var(--gold); margin-bottom: 3rem;
  }

  #tarina {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .story-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem; align-items: start;
  }

  .story-text p {
    color: var(--bone);
    margin-bottom: 1.2rem;
    font-size: 1rem; line-height: 1.8;
  }

  .story-badge {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; padding: 2rem;
    font-family: var(--font-text);
    font-style: italic; color: var(--bone);
    font-size: 1.05rem; line-height: 1.8;
    position: relative;
  }

  .story-badge::before {
    content: '"';
    font-family: var(--font-display);
    font-size: 5rem; color: var(--gold);
    opacity: 0.3;
    position: absolute; top: -1rem; left: 1.5rem; line-height: 1;
  }

  .story-badge .badge-source {
    display: block; margin-top: 1rem;
    font-family: var(--font-body);
    font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold); font-style: normal;
  }

  .disclaimer-strip {
    background: rgba(201,168,76,0.06);
    border-top: 1px dashed rgba(201,168,76,0.2);
    border-bottom: 1px dashed rgba(201,168,76,0.2);
    padding: 0.6rem 2rem; text-align: center;
    font-family: var(--font-text); font-style: italic;
    font-size: 0.8rem; color: var(--lightgray);
    margin: 1.5rem 0;
  }

  #jasenet { background: var(--black); }

  .members-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .member-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .member-card:hover {
    border-color: rgba(201,168,76,0.5);
    transform: translateY(-4px);
  }

  .member-avatar {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--midgray); font-size: 5rem;
  }

  .member-info { padding: 1.25rem; }

  .member-callsign {
    font-family: var(--font-display);
    font-size: 1.3rem; color: var(--gold); margin-bottom: 0.25rem;
  }

  .member-role {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--lightgray); margin-bottom: 0.5rem;
  }

  .member-desc { font-size: 0.9rem; color: var(--bone); line-height: 1.6; }

  /* CARS */
  #autot {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .cars-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
  }

  .car-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s;
  }

  .car-card:hover { border-color: rgba(201,168,76,0.45); }

  .car-img-placeholder {
    width: 100%; height: 200px;
    background: var(--midgray);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    position: relative;
  }

  /* ---- AUTO-KATEGORIAT ---- */
  .car-type-badge {
    position: absolute; top: 12px; right: 12px;
    font-family: var(--font-body);
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px;
  }

  .badge-kaytto     { background: #1a3a5c; color: #8bbfe0; }
  .badge-pommi      { background: #4a3000; color: #f0a830; }
  .badge-projekti   { background: #2d5a3d; color: #a8d4b8; }
  .badge-nayttely   { background: #4a2060; color: #c89de0; }
  .badge-tuhoutunut { background: #5a1010; color: #e08080; }
  .badge-myyty      { background: #333;    color: #888;    }
  .badge-kakkosauto { background: #1a3020; color: #70b080; }

  .car-body { padding: 1.25rem; }

  .car-name {
    font-family: var(--font-display);
    font-size: 1.2rem; color: var(--white); margin-bottom: 0.2rem;
  }

  .car-owner {
    font-family: var(--font-body);
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1rem;
  }

  .car-specs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
  }

  .spec-item {
    background: var(--midgray);
    padding: 0.5rem 0.75rem; border-radius: 2px;
  }

  .spec-label {
    font-family: var(--font-body);
    font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--lightgray); display: block; margin-bottom: 2px;
  }

  .spec-value {
    font-family: var(--font-body);
    font-size: 0.95rem; font-weight: 500; color: var(--white);
  }

  /* RULES */
  #saannot { background: var(--black); }

  .rules-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }

  .rule-item {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 4px;
    border-left: 3px solid var(--gold);
    transition: background 0.2s;
  }

  .rule-item:hover { background: var(--midgray); }

  .rule-num {
    font-family: var(--font-display);
    font-size: 1.2rem; color: var(--gold);
    opacity: 0.5; min-width: 28px; line-height: 1.4;
  }

  .rule-text { font-size: 0.9rem; color: var(--bone); line-height: 1.5; }

  .warning-banner {
    background: var(--midgray);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px; padding: 1.5rem 2rem;
    margin-top: 2.5rem;
    display: flex; align-items: center; gap: 1.5rem;
  }

  .warning-icon { font-size: 2.5rem; }

  .warning-text {
    font-family: var(--font-text); font-style: italic;
    color: var(--bone); font-size: 0.95rem; line-height: 1.6;
  }

  /* JOIN */
  #liity {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    text-align: center;
  }

  .join-inner { max-width: 700px; margin: 0 auto; }

  .join-steps {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem; margin: 3rem 0; text-align: left;
  }

  .join-step {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; padding: 1.5rem;
  }

  .join-step-num {
    font-family: var(--font-display);
    font-size: 2.5rem; color: var(--gold);
    opacity: 0.4; line-height: 1; margin-bottom: 0.5rem;
  }

  .join-step-title {
    font-family: var(--font-body);
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--white); margin-bottom: 0.5rem;
  }

  .join-step-desc { font-size: 0.85rem; color: var(--bone); line-height: 1.6; }

  .btn-primary {
    display: inline-block;
    font-family: var(--font-body);
    font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--black); background: var(--gold);
    padding: 0.9rem 2.5rem; text-decoration: none;
    border-radius: 2px; transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--bone); transform: translateY(-2px); }

  /* SHOP */
  #kauppa { background: var(--black); }

  .shop-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
  }

  .shop-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .shop-card:hover { border-color: var(--gold); transform: translateY(-4px); }

  .shop-img {
    width: 100%; height: 180px;
    display: flex; align-items: center; justify-content: center;
    background: var(--midgray); font-size: 4rem;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .shop-body { padding: 1.25rem; }

  .shop-name {
    font-family: var(--font-display);
    font-size: 1.1rem; color: var(--white); margin-bottom: 0.5rem;
  }

  .shop-desc { font-size: 0.85rem; color: var(--bone); margin-bottom: 1rem; line-height: 1.6; }

  .shop-price-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  .shop-price {
    font-family: var(--font-display); font-size: 1.4rem; color: var(--gold);
  }

  .shop-price span {
    display: block; font-family: var(--font-text);
    font-size: 0.7rem; color: var(--lightgray); font-weight: 400;
  }

  .btn-order {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    padding: 0.6rem 1.2rem; text-decoration: none;
    border-radius: 2px; transition: background 0.2s, color 0.2s; cursor: pointer;
  }

  .btn-order:hover { background: var(--gold); color: var(--black); }

  .shop-note {
    margin-top: 2.5rem; text-align: center;
    font-style: italic; font-size: 0.9rem; color: var(--lightgray);
  }

  footer {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.2);
    padding: 3rem 2rem; text-align: center;
    position: relative; z-index: 1;
  }

  .footer-logo-img { width: 80px; margin-bottom: 1rem; opacity: 0.8; }

  .footer-brand {
    font-family: var(--font-display);
    font-size: 1.4rem; color: var(--gold);
    letter-spacing: 0.05em; margin-bottom: 0.25rem;
  }

  .footer-sub {
    font-family: var(--font-body);
    font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--lightgray); margin-bottom: 1.5rem;
  }

  .footer-links {
    display: flex; justify-content: center;
    gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }

  .footer-links a {
    font-family: var(--font-body);
    font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--bone); text-decoration: none; transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--gold); }

  .footer-social {
    display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;
  }

  .social-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-body);
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--bone); text-decoration: none;
    border: 1px solid rgba(201,168,76,0.25);
    padding: 0.5rem 1rem; border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
  }

  .social-btn:hover { border-color: var(--gold); color: var(--gold); }

  .footer-copy { font-size: 0.75rem; color: var(--lightgray); line-height: 1.8; }

  /* VASIKKA overlay */
  #vasikka-overlay {
    position: fixed; inset: 0; z-index: 20000;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }

  #vasikka-overlay.show { display: flex; }

  .vasikka-text {
    font-family: var(--font-display);
    font-size: clamp(4rem, 18vw, 12rem);
    color: #ff2200;
    text-shadow: 0 0 60px #ff220088;
    letter-spacing: 0.08em;
    animation: vasikkapulse 1s ease-in-out infinite;
  }

  @keyframes vasikkapulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .vasikka-sub {
    font-family: var(--font-body);
    font-size: 1rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--lightgray); margin-top: 1rem;
  }

  .vasikka-close {
    margin-top: 3rem;
    font-family: var(--font-body);
    font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #555; cursor: pointer; transition: color 0.2s;
    background: none; border: none; padding: 0.5rem 1rem;
  }

  .vasikka-close:hover { color: var(--lightgray); }

  @media (max-width: 768px) {
    nav { padding: 0 1rem; }
    .nav-links { gap: 1rem; }
    .nav-links li:nth-child(n+4) { display: none; }
    .story-grid { grid-template-columns: 1fr; gap: 2rem; }
    .members-grid { grid-template-columns: 1fr 1fr; }
    .cars-grid { grid-template-columns: 1fr; }
    .rules-grid { grid-template-columns: 1fr; }
    .join-steps { grid-template-columns: 1fr; }
    .shop-grid { grid-template-columns: 1fr; }
    .duck-counter { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <img src="1779946768622_image.png" alt="Outlaw Ducks logo">
    <div class="nav-brand">
      Outlaw Ducks
      <span>Tuning Crew · Oulu</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="#tarina">Tarina</a></li>
    <li><a href="#jasenet">Jäsenet</a></li>
    <li><a href="#autot">Autot</a></li>
    <li><a href="#saannot">Säännöt</a></li>
    <li><a href="#liity">Liity</a></li>
    <li><a href="#kauppa">Kauppa</a></li>
    <li><a href="tapahtumat.html">Tapahtumat</a></li>
  </ul>
