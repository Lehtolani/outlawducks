<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<title>Outlaw Ducks TC – Oulu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prosto+One&family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --offblack: #141414;
    --darkgray: #1c1c1c;
    --midgray: #2e2e2e;
    --lightgray: #888;
    --bone: #d4c9a8;
    --cream: #f0ead8;
    --gold: #c9a84c;
    --gold-dark: #9a7a2e;
    --duck-green: #2d5a3d;
    --duck-green-light: rgba(45,90,61,0.12);
    --duck-green-mid: rgba(45,90,61,0.06);
    --duck-orange: #d4651a;
    --white: #f5f0e8;
    --red: #a02020;
    --font-display: 'Prosto One', serif;
    --font-body: 'Oswald', sans-serif;
    --font-text: 'Barlow', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-text);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(13,13,13,0.95);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo img { height: 44px; width: 44px; object-fit: contain; }

  .nav-brand {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .nav-brand span {
    display: block;
    font-family: var(--font-body);
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--lightgray);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }

  .nav-links a {
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bone);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* NAV SOCIAL BUTTONS */
  .nav-social-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 5px; height: 32px; padding: 0 10px;
    font-family: var(--font-body);
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold); text-decoration: none;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }

  .nav-social-btn:hover { background: rgba(201,168,76,0.12); border-color: var(--gold); }

  /* Desktop: show icon + full label, hide mobile label */
  .social-icon-desktop { display: inline; }
  .social-label-desktop { display: inline; }
  .social-label-mobile { display: none; }

  @media (max-width: 900px) {
    .social-icon-desktop { display: none; }
    .social-label-desktop { display: none; }
    .social-label-mobile { display: inline; }
    .nav-social-btn { padding: 0 8px; }
  }

  /* DUCK COUNTER in nav */
  .duck-counter {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--lightgray);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 4px 12px;
    border-radius: 2px;
    cursor: default;
    transition: border-color 0.3s;
  }

  .duck-counter.active { border-color: rgba(201,168,76,0.5); color: var(--gold); }
  .duck-counter-icon { font-size: 1rem; }
  .duck-counter-num { font-family: var(--font-display); font-size: 1rem; color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-bg-ring {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: slowspin 40s linear infinite;
  }

  .hero-bg-ring:nth-child(2) {
    width: 900px; height: 900px;
    border-color: rgba(201,168,76,0.04);
    animation-duration: 60s;
    animation-direction: reverse;
  }

  @keyframes slowspin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .hero-logo {
    width: 220px; height: 220px;
    object-fit: contain;
    position: relative; z-index: 1;
    filter: drop-shadow(0 0 40px rgba(201,168,76,0.2));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 7rem);
    letter-spacing: 0.05em;
    color: var(--white);
    line-height: 0.9;
    margin-top: 2rem;
    position: relative; z-index: 1;
  }

  .hero h1 em { display: block; color: var(--gold); font-style: normal; }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 0.9rem; font-weight: 300;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--lightgray);
    margin-top: 1rem;
    position: relative; z-index: 1;
  }

  .hero-divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
    position: relative; z-index: 1;
  }

  .hero-tagline {
    font-family: var(--font-text);
    font-style: italic; font-size: 1.05rem;
    color: var(--bone); max-width: 500px;
    position: relative; z-index: 1;
  }

  .hero-scroll {
    margin-top: 3rem;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    color: var(--lightgray);
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: var(--font-body);
    position: relative; z-index: 1;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  .hero-scroll::after { content: '▼'; font-size: 0.6rem; }

  section { position: relative; z-index: 1; }

  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 5rem 2rem;
  }

  .section-label {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.5rem;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: var(--white); line-height: 1; margin-bottom: 2rem;
  }

  .section-divider {
    width: 60px; height: 2px;
    background: var(--gold); margin-bottom: 3rem;
  }

  #tarina {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .story-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem; align-items: start;
  }

  .story-text p {
    color: var(--bone);
    margin-bottom: 1.2rem;
    font-size: 1rem; line-height: 1.8;
  }

  .story-badge {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; padding: 2rem;
    font-family: var(--font-text);
    font-style: italic; color: var(--bone);
    font-size: 1.05rem; line-height: 1.8;
    position: relative;
  }

  .story-badge::before {
    content: '"';
    font-family: var(--font-display);
    font-size: 5rem; color: var(--gold);
    opacity: 0.3;
    position: absolute; top: -1rem; left: 1.5rem; line-height: 1;
  }

  .story-badge .badge-source {
    display: block; margin-top: 1rem;
    font-family: var(--font-body);
    font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold); font-style: normal;
  }

  .disclaimer-strip {
    background: rgba(201,168,76,0.06);
    border-top: 1px dashed rgba(201,168,76,0.2);
    border-bottom: 1px dashed rgba(201,168,76,0.2);
    padding: 0.6rem 2rem; text-align: center;
    font-family: var(--font-text); font-style: italic;
    font-size: 0.8rem; color: var(--lightgray);
    margin: 1.5rem 0;
  }

  #jasenet { background: var(--black); }

  .members-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
  }

  /* Legend spans full width at top */
  .member-card.legend {
    grid-column: 1 / -1;
    grid-template-columns: 240px 1fr;
    display: grid;
  }

  /* Normal cards: stacked (image on top, text below) */
  .member-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
    display: flex; flex-direction: column;
  }

  .member-card:hover {
    border-color: rgba(201,168,76,0.5);
    transform: translateY(-3px);
  }

  /* Legend card horizontal layout */
  .member-card.legend {
    flex-direction: row;
  }

  .member-card.legend .member-avatar {
    width: 240px; flex-shrink: 0; aspect-ratio: 1;
  }

  .member-avatar {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--midgray); font-size: 5rem;
    overflow: hidden;
  }

  .member-avatar img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
    display: block;
  }

  .member-info { padding: 1.25rem; display: flex; flex-direction: column; justify-content: center; }

  .member-card.legend .member-info { padding: 1.75rem; }

  .member-callsign {
    font-family: var(--font-display);
    font-size: 1.4rem; color: var(--gold); margin-bottom: 0.25rem;
  }

  .member-role {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--lightgray); margin-bottom: 0.75rem;
  }

  .member-desc { font-size: 0.9rem; color: var(--bone); line-height: 1.7; }

  /* CARS */
  #autot {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .cars-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
  }

  .car-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s;
  }

  .car-card:hover { border-color: rgba(201,168,76,0.45); }

  .car-img-placeholder {
    width: 100%; height: 200px;
    background: var(--midgray);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    position: relative;
  }

  /* ---- KUVAKARUSELLI ---- */
  .car-carousel {
    width: 100%; height: 280px;
    position: relative; overflow: hidden;
    background: var(--midgray);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .carousel-track {
    display: flex; height: 100%;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .carousel-slide {
    min-width: 100%; height: 100%;
    position: relative; flex-shrink: 0;
  }

  .carousel-slide img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold); font-size: 1.1rem;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5; border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
    user-select: none;
  }

  .carousel-btn:hover { background: rgba(0,0,0,0.8); border-color: var(--gold); }
  .carousel-btn.prev { left: 8px; }
  .carousel-btn.next { right: 8px; }

  .carousel-dots {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 5;
  }

  .carousel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer; transition: background 0.2s;
  }

  .carousel-dot.active { background: var(--gold); }

  /* ---- AUTO-KATEGORIAT ---- */
  .car-type-badge {
    position: absolute; top: 12px; right: 12px;
    font-family: var(--font-body);
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px;
    z-index: 10; /* stays on top of carousel slides */
    pointer-events: none;
  }

  /* Sticky badge wrapper — lives outside carousel-track so it doesn't scroll */
  .car-carousel > .car-type-badge {
    position: absolute; top: 12px; right: 12px; z-index: 10;
  }

  /* MUUTA kenttä */
  .car-muuta {
    margin-top: 0.75rem;
    padding: 0.5rem 0.75rem;
    background: rgba(201,168,76,0.07);
    border-left: 2px solid rgba(201,168,76,0.3);
    border-radius: 0 2px 2px 0;
    font-size: 0.82rem;
    font-style: italic;
    color: var(--bone);
    line-height: 1.5;
  }

  .car-muuta-label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    font-style: normal;
    display: block;
    margin-bottom: 2px;
  }

  /* TUHOUTUNUT overlay */
  .car-card.wrecked .car-carousel { filter: grayscale(0.6) brightness(0.5); }
  .wrecked-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    height: 100%; display: flex; align-items: center;
    justify-content: center; z-index: 4; pointer-events: none;
  }
  .wrecked-label {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    color: #ff2200;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(255,34,0,0.6), 0 2px 8px #000, 2px 2px 0 #600, -1px -1px 0 #000;
    -webkit-text-stroke: 1px #000;
  }

  /* MYYTY overlay */
  .car-card.sold { position: relative; }
  .car-card.sold .car-carousel { filter: grayscale(0.9) brightness(0.45); }
  .sold-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    height: 100%; display: flex; align-items: center;
    justify-content: center; z-index: 4; pointer-events: none;
  }
  .sold-label {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4.5vw, 3.2rem);
    font-weight: 900;
    color: #ff2200;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(255,34,0,0.5), 0 2px 8px #000, 2px 2px 0 #600, -1px -1px 0 #000;
    -webkit-text-stroke: 1px #000;
  }

  .badge-kaytto     { background: #1a3a5c; color: #8bbfe0; }
  .badge-pommi      { background: #4a3000; color: #f0a830; }
  .badge-projekti   { background: #2d5a3d; color: #a8d4b8; }
  .badge-nayttely   { background: #4a2060; color: #c89de0; }
  .badge-tuhoutunut { background: #5a1010; color: #e08080; }
  .badge-myyty      { background: #333;    color: #888;    }
  .badge-kakkosauto { background: #1a3020; color: #70b080; }

  .car-body { padding: 1.25rem; }

  .car-name {
    font-family: var(--font-display);
    font-size: 1.2rem; color: var(--white); margin-bottom: 0.2rem;
  }

  .car-owner {
    font-family: var(--font-body);
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1rem;
  }

  .car-specs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
  }

  .spec-item {
    background: var(--midgray);
    padding: 0.5rem 0.75rem; border-radius: 2px;
  }

  .spec-label {
    font-family: var(--font-body);
    font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--lightgray); display: block; margin-bottom: 2px;
  }

  .spec-value {
    font-family: var(--font-body);
    font-size: 0.95rem; font-weight: 500; color: var(--white);
  }

  /* RULES */
  #saannot { background: var(--black); }

  .rules-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }

  .rule-item {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 4px;
    border-left: 3px solid var(--gold);
    transition: background 0.2s;
  }

  .rule-item:hover { background: var(--midgray); }

  .rule-num {
    font-family: var(--font-display);
    font-size: 1.2rem; color: var(--gold);
    opacity: 0.5; min-width: 28px; line-height: 1.4;
  }

  .rule-text { font-size: 0.9rem; color: var(--bone); line-height: 1.5; }

  .warning-banner {
    background: var(--midgray);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px; padding: 1.5rem 2rem;
    margin-top: 2.5rem;
    display: flex; align-items: center; gap: 1.5rem;
  }

  .warning-icon { font-size: 2.5rem; }

  .warning-text {
    font-family: var(--font-text); font-style: italic;
    color: var(--bone); font-size: 0.95rem; line-height: 1.6;
  }

  /* JOIN */
  #liity {
    background: var(--offblack);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    text-align: center;
  }

  .join-inner { max-width: 700px; margin: 0 auto; }

  .join-steps {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem; margin: 3rem 0; text-align: left;
  }

  .join-step {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; padding: 1.5rem;
  }

  .join-step-num {
    font-family: var(--font-display);
    font-size: 2.5rem; color: var(--gold);
    opacity: 0.4; line-height: 1; margin-bottom: 0.5rem;
  }

  .join-step-title {
    font-family: var(--font-body);
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--white); margin-bottom: 0.5rem;
  }

  .join-step-desc { font-size: 0.85rem; color: var(--bone); line-height: 1.6; }

  .btn-primary {
    display: inline-block;
    font-family: var(--font-body);
    font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--black); background: var(--gold);
    padding: 0.9rem 2.5rem; text-decoration: none;
    border-radius: 2px; transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--bone); transform: translateY(-2px); }

  /* SHOP */
  #kauppa { background: var(--black); }

  .shop-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
  }

  .shop-card {
    background: var(--darkgray);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .shop-card:hover { border-color: var(--gold); transform: translateY(-4px); }

  .shop-img {
    width: 100%; height: 180px;
    display: flex; align-items: center; justify-content: center;
    background: var(--midgray); font-size: 4rem;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .shop-body { padding: 1.25rem; }
